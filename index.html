<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atrium Display</title>
  <style>
    :root {
      --bg: #08111d;
      --panel: #12233a;
      --panel-2: #1a2f4d;
      --border: rgba(255,255,255,0.14);
      --text: #ffffff;
      --muted: rgba(255,255,255,0.78);
      --accent: #d8b15a;
      --accent-2: #6ed0dc;
      --live: #d54848;
      --ok: #4ea86f;
      --shadow: 0 12px 28px rgba(0,0,0,0.28);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: #08111d;
      color: var(--text);
    }

    body {
      background-image: linear-gradient(180deg, #08111d 0%, #0c1930 100%);
    }

    .shell {
      width: 100%;
      height: 100%;
      padding: 18px;
      display: grid;
      grid-template-columns: 400px 1fr;
      gap: 18px;
    }

    .left-column,
    .right-column {
      min-height: 0;
      display: grid;
      gap: 18px;
    }

    .left-column {
      grid-template-rows: auto 1fr auto;
    }

    .right-column {
      grid-template-rows: 1fr auto;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
      min-height: 0;
    }

    .hero-card {
      padding: 24px;
      background: linear-gradient(135deg, #22344f 0%, #1c2840 55%, #243754 100%);
    }

    .eyebrow {
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      color: var(--accent);
      margin-bottom: 8px;
      font-weight: 800;
    }

    .title {
      margin: 0;
      font-size: 2.25rem;
      line-height: 1.02;
      font-weight: 800;
    }

    .subtitle {
      margin-top: 14px;
      color: var(--muted);
      font-size: 1rem;
      line-height: 1.45;
    }

    .countdown {
      margin-top: 18px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .countbox {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      text-align: center;
      padding: 12px 8px;
    }

    .countbox strong {
      display: block;
      font-size: 1.7rem;
      line-height: 1;
      margin-bottom: 6px;
    }

    .countbox span {
      font-size: 0.74rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 700;
    }

    .welcome-card {
      padding: 18px;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 14px;
      background: linear-gradient(180deg, #182a45 0%, #13233a 100%);
    }

    .panel-label {
      font-size: 0.8rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 800;
      margin-bottom: 6px;
    }

    .panel-title {
      margin: 0;
      font-size: 1.3rem;
      font-weight: 800;
    }

    .welcome-wrap {
      min-height: 0;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
      background: #0b1322;
    }

    .frame {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: #0b1322;
    }

    .clock-card {
      padding: 18px 20px;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 16px;
      align-items: center;
      background: linear-gradient(180deg, #1b304f 0%, #13233a 100%);
    }

    .clock-time {
      font-size: 2.3rem;
      font-weight: 800;
      line-height: 1;
    }

    .clock-date {
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.96rem;
    }

    .status-area {
      min-width: 0;
    }

    .status-pill {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 0.92rem;
      font-weight: 800;
      margin-bottom: 8px;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.08);
    }

    .status-pill.live {
      background: rgba(213,72,72,0.22);
      border-color: rgba(213,72,72,0.46);
      color: #ffe5e5;
    }

    .status-pill.upcoming {
      background: rgba(216,177,90,0.18);
      border-color: rgba(216,177,90,0.4);
      color: #ffe7b2;
    }

    .status-pill.offline {
      background: rgba(78,168,111,0.16);
      border-color: rgba(78,168,111,0.38);
      color: #dcffea;
    }

    .status-text {
      color: var(--muted);
      font-size: 0.94rem;
      line-height: 1.3;
    }

    .main-stage {
      position: relative;
      min-height: 0;
      background: #0b1322;
    }

    .main-shell,
    .live-shell {
      position: absolute;
      inset: 0;
    }

    .live-shell {
      display: none;
      background: #000;
    }

    .live-shell.active {
      display: block;
    }

    .live-badge {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 4;
      background: var(--live);
      color: #fff;
      font-size: 0.92rem;
      font-weight: 800;
      padding: 7px 11px;
      border-radius: 10px;
    }

    .yt-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 4;
      background: rgba(0,0,0,0.55);
      color: #fff;
      font-size: 0.92rem;
      font-weight: 800;
      padding: 7px 11px;
      border-radius: 10px;
    }

    .footer-strip {
      padding: 14px 16px;
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
      align-items: center;
      background: linear-gradient(180deg, #22344f 0%, #1a2d49 100%);
      color: var(--muted);
      font-size: 0.94rem;
    }

    .tag {
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-weight: 800;
      font-size: 0.9rem;
    }

    @media (max-width: 1200px) {
      .shell {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
      }

      .left-column {
        grid-template-rows: auto auto auto;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="left-column">
      <section class="card hero-card">
        <div class="eyebrow">Atrium Display</div>
        <h1 class="title">Welcome to Versailles UMC</h1>
        <div class="subtitle" id="heroSubtitle">
          Next Service Starts In...
        </div>
        <div class="countdown" id="countdown"></div>
      </section>

      <section class="card welcome-card">
        <div>
          <div class="panel-label">Welcome Center</div>
                </div>
        <div class="welcome-wrap">
          <iframe id="welcomeFrame" class="frame" title="Welcome Center Feed"></iframe>
        </div>
      </section>

      <section class="card clock-card">
        <div>
          <div class="clock-time" id="clockTime">--:--</div>
          <div class="clock-date" id="clockDate">Loading date...</div>
        </div>
        <div class="status-area">
          <div class="status-pill offline" id="statusPill">Display Mode</div>
          <div class="status-text" id="statusText">Weekly Feed is visible until service begins.</div>
        </div>
      </section>
    </div>

    <div class="right-column">
      <section class="card main-stage">
        <div class="main-shell">
          <iframe id="weeklyFrame" class="frame" title="Weekly Feed"></iframe>
        </div>

        <div class="live-shell" id="liveShell">
          <iframe id="liveFrame" class="frame" title="YouTube Live Feed" allow="autoplay; encrypted-media; picture-in-picture"></iframe>
          <div class="live-badge">● LIVE</div>
          <div class="yt-badge">YouTube</div>
        </div>
      </section>

      <section class="card footer-strip">
        <div id="footerMessage">Announcements, highlights, and ways to connect.</div>
        <div class="tag">Weekly Feed</div>
        <div class="tag" id="refreshStatus">Auto-refresh on</div>
      </section>
    </div>
  </div>

  <script>
    const CONFIG = {
      timezone: 'America/New_York',
      weeklyFeedUrl: 'https://vumc-weekly-feed.netlify.app/',
      welcomeCenterUrl: 'https://welcome-center.netlify.app/',
      youtubeEmbedUrl: 'https://www.youtube.com/embed/live_stream?channel=UC_svgodM3blLqWEBQ5yNjmA&autoplay=1&mute=1',
      streamCheckMs: 30000,
      hardRefreshMs: 15 * 60 * 1000,
      serviceWindows: [
        { day: 0, start: '10:15', end: '11:45', label: 'Worship Service' }
      ]
    };

    const els = {
      weeklyFrame: document.getElementById('weeklyFrame'),
      welcomeFrame: document.getElementById('welcomeFrame'),
      liveFrame: document.getElementById('liveFrame'),
      liveShell: document.getElementById('liveShell'),
      statusPill: document.getElementById('statusPill'),
      statusText: document.getElementById('statusText'),
      footerMessage: document.getElementById('footerMessage'),
      refreshStatus: document.getElementById('refreshStatus'),
      clockTime: document.getElementById('clockTime'),
      clockDate: document.getElementById('clockDate'),
      countdown: document.getElementById('countdown'),
      heroSubtitle: document.getElementById('heroSubtitle')
    };

    function formatInTimeZone(date, options) {
      return new Intl.DateTimeFormat('en-US', { timeZone: CONFIG.timezone, ...options }).format(date);
    }

    function getPartsInTimeZone(date = new Date()) {
      const formatter = new Intl.DateTimeFormat('en-US', {
        timeZone: CONFIG.timezone,
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false,
        weekday: 'short'
      });

      const parts = formatter.formatToParts(date);
      const map = {};
      for (const p of parts) {
        if (p.type !== 'literal') map[p.type] = p.value;
      }
      return map;
    }

    function weekdayToIndex(shortWeekday) {
      return { Sun: 0, Mon: 1, Tue: 2, Wed: 3, Thu: 4, Fri: 5, Sat: 6 }[shortWeekday];
    }

    function minutesFromTimeString(value) {
      const [h, m] = value.split(':').map(Number);
      return (h * 60) + m;
    }

    function getScheduleStatus(now = new Date()) {
      const parts = getPartsInTimeZone(now);
      const currentWeekday = weekdayToIndex(parts.weekday);
      const currentMinutes = (Number(parts.hour) * 60) + Number(parts.minute);

      let currentWindow = null;
      let nextWindow = null;

      for (const win of CONFIG.serviceWindows) {
        const startMin = minutesFromTimeString(win.start);
        const endMin = minutesFromTimeString(win.end);
        if (win.day === currentWeekday && currentMinutes >= startMin && currentMinutes < endMin) {
          currentWindow = win;
        }
      }

      if (!currentWindow) {
        for (let offset = 0; offset < 8; offset++) {
          const checkDay = (currentWeekday + offset) % 7;
          const candidates = CONFIG.serviceWindows
            .filter(win => win.day === checkDay)
            .sort((a, b) => minutesFromTimeString(a.start) - minutesFromTimeString(b.start));

          for (const candidate of candidates) {
            const startMin = minutesFromTimeString(candidate.start);
            if (offset > 0 || startMin > currentMinutes) {
              nextWindow = { ...candidate, daysAway: offset };
              return { currentWindow: null, nextWindow };
            }
          }
        }
      }

      return { currentWindow, nextWindow };
    }

    function getNextWindowDate(nextWindow, now = new Date()) {
      if (!nextWindow) return null;

      const tzDateString = formatInTimeZone(now, {
        year: 'numeric', month: '2-digit', day: '2-digit'
      });
      const [month, day, year] = tzDateString.split('/').map(Number);
      const base = new Date(year, month - 1, day);
      base.setDate(base.getDate() + (nextWindow.daysAway || 0));

      const [hours, minutes] = nextWindow.start.split(':').map(Number);
      base.setHours(hours, minutes, 0, 0);
      return base;
    }

    function updateCountdown() {
      const { currentWindow, nextWindow } = getScheduleStatus(new Date());
      els.countdown.innerHTML = '';

      if (currentWindow) {
        els.heroSubtitle.textContent = `${currentWindow.label} is currently within the scheduled service window.`;
        return;
      }

      const nextDate = getNextWindowDate(nextWindow, new Date());
      if (!nextDate) return;

      const diff = nextDate.getTime() - Date.now();
      if (diff <= 0) return;

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((diff / (1000 * 60)) % 60);
      const seconds = Math.floor((diff / 1000) % 60);

      const parts = [
        ['Days', days],
        ['Hours', hours],
        ['Minutes', minutes],
        ['Seconds', seconds]
      ];

      for (const [label, value] of parts) {
        const div = document.createElement('div');
        div.className = 'countbox';
        div.innerHTML = `<strong>${String(value).padStart(2, '0')}</strong><span>${label}</span>`;
        els.countdown.appendChild(div);
      }

      els.heroSubtitle.textContent = `Counting down to ${nextWindow.label}. During service, the large Weekly Feed frame can switch over to the YouTube live feed automatically.`;
    }

    function updateClock() {
      const now = new Date();
      els.clockTime.textContent = formatInTimeZone(now, {
        hour: 'numeric', minute: '2-digit', hour12: true
      });
      els.clockDate.textContent = formatInTimeZone(now, {
        weekday: 'long', month: 'long', day: 'numeric', year: 'numeric'
      });
    }

    function setStatus(mode, label, text) {
      els.statusPill.className = 'status-pill ' + mode;
      els.statusPill.textContent = label;
      els.statusText.textContent = text;
    }

    function setLiveMode(isLive, label = 'Worship Service') {
      if (isLive) {
        els.liveShell.classList.add('active');
        els.liveFrame.src = CONFIG.youtubeEmbedUrl;
        setStatus('live', 'LIVE NOW', `${label} is currently live in the large display frame.`);
        els.footerMessage.textContent = 'YouTube Live is active in the large Weekly Feed frame.';
      } else {
        els.liveShell.classList.remove('active');
        els.liveFrame.src = 'about:blank';
        const { nextWindow } = getScheduleStatus(new Date());
        if (nextWindow) {
          setStatus('upcoming', 'Up Next', `${nextWindow.label} is the next scheduled worship window.`);
        } else {
          setStatus('offline', 'Display Mode', 'Weekly Feed is visible until service begins.');
        }
        els.footerMessage.textContent = 'Announcements, highlights, and ways to connect.';
      }
    }

    function checkLiveWindow() {
      const { currentWindow } = getScheduleStatus(new Date());
      setLiveMode(!!currentWindow, currentWindow?.label || 'Worship Service');
    }

    function init() {
      els.weeklyFrame.src = CONFIG.weeklyFeedUrl;
      els.welcomeFrame.src = CONFIG.welcomeCenterUrl;
      updateClock();
      updateCountdown();
      checkLiveWindow();

      setInterval(() => {
        updateClock();
        updateCountdown();
      }, 1000);

      setInterval(checkLiveWindow, CONFIG.streamCheckMs);

      setInterval(() => {
        els.refreshStatus.textContent = 'Refreshing browser';
        window.location.reload();
      }, CONFIG.hardRefreshMs);
    }

    init();
  </script>
</body>
</html>
